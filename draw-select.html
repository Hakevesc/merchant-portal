<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Draw Selection — Merchant Promo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="portal.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body.portal-body { background: #f2f4f6; font-family: 'Barlow', sans-serif; }

    /* ════════ REDESIGNED HEADER ════════ */
    .portal-topbar {
      background: linear-gradient(120deg, #1b7341 0%, #239150 48%, #2cb464 100%);
      padding: 14px 40px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 6px 24px rgba(35, 145, 80, 0.28);
      position: sticky; top: 0; z-index: 100; overflow: hidden;
    }
    .portal-topbar::after {
      content: ""; position: absolute; top: -60%; right: 8%;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .portal-topbar .brand {
      display: flex; align-items: center; gap: 16px; position: relative; z-index: 1;
    }
    .portal-topbar .brand .logo-wrapper {
      display: flex; align-items: center; justify-content: center;
      background: #ffffff; border-radius: 14px; padding: 9px 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.16);
    }
    .portal-topbar .brand .logo-wrapper img { height: 30px; object-fit: contain; display: block; }
    .portal-topbar .brand-title {
      font-family: 'Barlow', sans-serif !important;
      font-weight: 800; font-size: 1.05rem; letter-spacing: 0.6px;
      text-transform: uppercase; color: #ffffff !important;
      padding-left: 16px; border-left: 2px solid rgba(255,255,255,0.28); line-height: 1.15;
    }
    .portal-topbar .topbar-right { position: relative; z-index: 1; }

    @media (max-width: 620px) {
      .portal-topbar .brand-title { font-size: 0.8rem; padding-left: 12px; }
      .portal-topbar .logout-btn span.lbl { display: none; }
    }

    .portal-wrap { max-width: 1200px; margin: 0 auto; padding: 24px 32px 100px; }

    /* --- banner --- */
    .p-card { background: transparent; box-shadow: none; margin-bottom: 36px; }
    .p-banner {
      background: linear-gradient(125deg, #1e7b46 0%, #239150 40%, #2bb162 100%);
      border-radius: 32px; padding: 32px 28px; text-align: center;
      box-shadow: 0 15px 35px rgba(35, 145, 80, 0.25);
      position: relative; overflow: hidden; transition: transform 0.2s ease;
    }
    .p-banner .banner-deco {
      position: absolute; pointer-events: none; opacity: 0.08;
    }
    .p-banner .banner-deco.right {
      bottom: -20px; right: -10px;
    }
    .p-banner .banner-deco.right i,
    .p-banner .banner-deco.right [data-lucide] {
      width: 120px; height: 120px; stroke-width: 1.2;
    }
    .p-banner .banner-deco.left {
      top: -20px; left: -10px;
    }
    .p-banner .banner-deco.left i,
    .p-banner .banner-deco.left [data-lucide] {
      width: 90px; height: 90px; stroke-width: 1.2;
    }
    .prize-label {
      font-size: 1.9rem; font-weight: 800; letter-spacing: -0.3px;
      text-shadow: 0 2px 5px rgba(0,0,0,0.1);
      background: linear-gradient(135deg, #ffffff, #f9ffea);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    @media (max-width: 640px) {
      .prize-label { font-size: 1.3rem; }
      .p-banner { padding: 22px 18px; }
    }

    /* ════════ SECTION HEADING (Prize Categories) ════════ */
    .section-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 18px; margin: 4px 0 30px;
    }
    .section-wrap .line {
      display: block; height: 2px; width: 70px; max-width: 12vw;
      background: linear-gradient(90deg, transparent, rgba(35,145,80,0.45)); border-radius: 2px;
      flex-shrink: 0;
    }
    .section-wrap .line.right { background: linear-gradient(90deg, rgba(35,145,80,0.45), transparent); }
    .section-heading {
      display: inline-flex; align-items: center; gap: 9px;
      font-size: 0.82rem; font-weight: 800; color: #239150;
      text-transform: uppercase; letter-spacing: 3px;
      background: #ffffff; padding: 11px 28px; border-radius: 60px;
      border: 1.5px solid rgba(35,145,80,0.18);
      box-shadow: 0 6px 18px rgba(35,145,80,0.12); white-space: nowrap;
    }
    .section-heading i,
    .section-heading [data-lucide] { width: 17px; height: 17px; stroke-width: 2.4; color: #239150; }

    /* ---- Region horizontal radio list ---- */
    .region-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 16px;
      padding-bottom: 110px; /* space for floating bottom bar */
    }
    .region-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border: 2px solid #d4e9db;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
      user-select: none;
    }
    .region-card:hover {
      border-color: #239150;
      background: #f4fbf6;
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(35, 145, 80, 0.12);
    }
    .region-card.selected {
      border-color: #239150;
      background: #eef8f2;
      box-shadow: 0 8px 24px rgba(35, 145, 80, 0.2);
    }
    .region-card input[type="radio"] {
      display: none;
    }
    .region-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .radio-indicator {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2.5px solid #a8c8b4;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      flex-shrink: 0;
      background: #ffffff;
    }
    .region-card.selected .radio-indicator {
      border-color: #239150;
      background: #239150;
    }
    .radio-indicator::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffffff;
      opacity: 0;
      transform: scale(0.4);
      transition: all 0.2s;
    }
    .region-card.selected .radio-indicator::after {
      opacity: 1;
      transform: scale(1);
    }
    .region-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: #eef9f2;
      color: #239150;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .region-card.selected .region-icon {
      background: #239150;
      color: #ffffff;
    }
    .region-card h3 {
      font-family: 'Barlow', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: -0.2px;
      text-transform: uppercase;
      margin: 0;
    }
    .region-badge {
      font-size: 0.74rem;
      font-weight: 800;
      color: #239150;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: #eaf5ee;
      padding: 6px 14px;
      border-radius: 30px;
      transition: all 0.2s;
    }
    .region-card.selected .region-badge {
      background: #239150;
      color: #ffffff;
    }

    /* Floating bottom bar */
    .float-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: #ffffff;
      border-radius: 60px;
      padding: 10px 14px 10px 24px;
      box-shadow: 0 10px 36px rgba(0,0,0,.16), 0 2px 10px rgba(35,145,80,.15);
      border: 1.5px solid rgba(35,145,80,.2);
      z-index: 100;
      min-width: 480px;
      max-width: calc(100vw - 48px);
    }
    .float-bar-btn {
      padding: 14px 34px;
      border: none;
      border-radius: 60px;
      font-family: 'Barlow', sans-serif;
      font-weight: 900;
      font-size: 0.95rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(105deg, #239150 0%, #2fc56d 100%);
      color: #ffffff;
      box-shadow: 0 6px 18px rgba(35, 145, 80, 0.35);
      transition: all 0.25s;
    }
    .float-bar-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(35, 145, 80, 0.45);
      filter: brightness(1.05);
    }

    @media (max-width: 1024px) {
      .region-cards { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .region-cards { grid-template-columns: 1fr; }
      .float-bar { min-width: calc(100vw - 32px); padding: 10px 14px; }
      .float-bar-btn { padding: 12px 22px; font-size: 0.85rem; }
    }

    .portal-body { background-image: radial-gradient(#dce5e0 0.8px, transparent 0.8px); background-size: 22px 22px; }
  </style>
</head>
<body class="portal-body">

  <div class="portal-topbar">
    <div class="brand">
      <div class="logo-wrapper">
        <img src="M-Pesa-Logo.png" alt="M-PESA">
      </div>
      <span class="brand-title">Merchant Promo</span>
    </div>
    <div class="topbar-right">
      <a href="index.html" class="logout-btn"><i data-lucide="log-out" style="width:16px;height:16px;stroke-width:2.5;"></i> Logout</a>
    </div>
  </div>

  <div class="portal-nav">
    <a href="home.html"><i data-lucide="home" style="width:16px;height:16px;vertical-align:middle;margin-right:4px;"></i> Home</a>
    &nbsp;›&nbsp; <span class="crumb-active" id="breadcrumb">Draw Selection</span>
  </div>

  <div class="portal-wrap">
    <div class="p-card">
      <div class="p-banner">
        <div class="banner-deco right"><i data-lucide="dices"></i></div>
        <div class="banner-deco left"><i data-lucide="sparkles"></i></div>
        <div class="prize-label" id="drawBanner">Customer's Weekly Draw</div>
        
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 18px;">
          <span style="background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(4px); padding: 7px 16px; border-radius: 50px; font-weight: 700; font-size: 0.82rem; color: #fff; border: 1px solid rgba(255,255,255,0.35); display: inline-flex; align-items: center; gap: 6px;">
            <i data-lucide="calendar" style="width:14px;height:14px;"></i> Scheduled Today
          </span>
          <span style="background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(4px); padding: 7px 16px; border-radius: 50px; font-weight: 700; font-size: 0.82rem; color: #fff; border: 1px solid rgba(255,255,255,0.35); display: inline-flex; align-items: center; gap: 6px;">
            <i data-lucide="award" style="width:14px;height:14px;"></i> Regional Prize
          </span>
          <span style="background: #ffffff; padding: 7px 18px; border-radius: 50px; font-weight: 900; font-size: 0.82rem; color: #1b7341; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 4px 14px rgba(0,0,0,0.12);">
            <i data-lucide="trophy" style="width:15px;height:15px;color:#1b7341;"></i> Total Winners: 10
          </span>
        </div>
      </div>
    </div>

    <div class="section-wrap">
      <span class="line"></span>
      <div class="section-heading"><i data-lucide="map-pin"></i> Select Region to Draw</div>
      <span class="line right"></span>
    </div>

    <div class="region-cards" id="prizeCards"></div>
  </div>

  <!-- Floating bottom bar -->
  <div class="float-bar">
    <div style="display: flex; align-items: center; gap: 12px;">
      <div style="width: 40px; height: 40px; border-radius: 50%; background: #eef8f2; display: flex; align-items: center; justify-content: center; color: #239150; flex-shrink: 0;">
        <i data-lucide="map-pin" style="width: 20px; height: 20px;"></i>
      </div>
      <div>
        <div style="font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #6c7a72;">Selected Region</div>
        <div style="font-size: 1.05rem; font-weight: 900; color: #1a1a1a;" id="selectedRegionText">R - 1 Regional Prize</div>
      </div>
    </div>
    <button id="runDrawBtn" class="float-bar-btn">
      <i data-lucide="play" style="width: 18px; height: 18px; stroke-width: 2.8; fill: currentColor;"></i> RUN DRAW
    </button>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const type = params.get('type') || 'customers';

      const typeLabels = {
        customers: "Customer's Weekly Draw",
        merchants: "Merchant's Weekly Draw",
        agents: "Agent's Weekly Draw"
      };

      const titleText = typeLabels[type] || "Customer's Weekly Draw";
      document.getElementById('drawBanner').innerHTML = `<i data-lucide="users" style="width:32px;height:32px;display:inline;vertical-align:middle;margin-right:6px;color:#fff;"></i> ${titleText}`;
      document.getElementById('breadcrumb').innerHTML = titleText;

      const gridContainer = document.getElementById('prizeCards');
      gridContainer.innerHTML = '';

      let currentSelectedRegion = 'R-1';
      let currentSelectedCode = 'R - 1';

      for (let i = 1; i <= 10; i++) {
        const regionCode = `R - ${i}`;
        const regionVal = `R-${i}`;
        const isSelected = (i === 1);

        const card = document.createElement('label');
        card.className = `region-card ${isSelected ? 'selected' : ''}`;
        card.setAttribute('for', `radio-${regionVal}`);
        card.innerHTML = `
          <div class="region-left">
            <input type="radio" name="regionSelect" id="radio-${regionVal}" value="${regionVal}" ${isSelected ? 'checked' : ''} />
            <div class="radio-indicator"></div>
            <div class="region-icon"><i data-lucide="map-pin"></i></div>
            <h3>${regionCode}</h3>
          </div>
          <span class="region-badge">Select</span>
        `;

        card.addEventListener('click', function() {
          document.querySelectorAll('.region-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          const radio = card.querySelector('input[type="radio"]');
          if (radio) radio.checked = true;
          currentSelectedRegion = regionVal;
          currentSelectedCode = regionCode;
          document.getElementById('selectedRegionText').textContent = `${regionCode} Regional Prize`;
        });

        gridContainer.appendChild(card);
      }

      document.getElementById('runDrawBtn').addEventListener('click', function() {
        window.location.href = `loading.html?type=${type}&region=${currentSelectedRegion}&label=${encodeURIComponent(currentSelectedCode + ' Regional Prize')}`;
      });

      if (typeof lucide !== 'undefined' && lucide.createIcons) { lucide.createIcons(); }

    })();
  </script>
  <noscript>Enable JavaScript to view draw categories</noscript>
  <script src="sidebar.js"></script>
</body>
</html>
