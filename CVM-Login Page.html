<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — M-PESA Campaign Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="portal.css" />
  <style>
    .left-title {
      font-family: 'Barlow', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.2;
      text-align: center;
    }
    .left-title span { display: block; }
    .cvm-input-wrap {
      position: relative;
      margin-bottom: 24px;
    }
    .cvm-input {
      width: 100%;
      padding: 18px 20px 18px 54px;
      border: 2px solid #d4e9db;
      border-radius: 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      outline: none;
      background: #fafafa;
      transition: border-color 0.25s, box-shadow 0.2s, background 0.25s;
    }
    .cvm-input:focus {
      border-color: #239150;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(35, 145, 80, 0.12);
    }
    .cvm-input-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #239150;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cvm-input-icon svg {
      width: 22px;
      height: 22px;
      stroke-width: 2.2;
    }
    .cvm-toggle-pw {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: none;
      border: none;
      padding: 0;
    }
    .cvm-toggle-pw svg {
      width: 22px;
      height: 22px;
      stroke-width: 2.2;
    }
    .cvm-login-btn {
      width: 100%;
      padding: 18px 28px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #2FC56D 0%, #239150 100%);
      color: #fff;
      font-family: 'Barlow', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(35, 145, 80, 0.30);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .cvm-login-btn:hover {
      box-shadow: 0 12px 32px rgba(35, 145, 80, 0.40);
      transform: translateY(-1px);
    }
    .cvm-login-btn svg {
      width: 20px;
      height: 20px;
      stroke-width: 2.5;
    }
    .input-label {
      font-size: 13px;
      font-weight: 700;
      color: #239150;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      font-family: 'Barlow', sans-serif;
    }
    .error-msg {
      color: #e74c3c;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      min-height: 0;
      font-family: 'Barlow', sans-serif;
    }
    .lp-logo-box {
      background: #fff;
      border-radius: 20px;
      padding: 18px 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.14);
    }
    .lp-logo-box img {
      height: 56px;
      object-fit: contain;
      display: block;
    }
    .left-tagline {
      text-align: center;
    }
    .left-tagline p {
      color: rgba(255, 255, 255, 0.75);
      font-size: 17px;
      font-weight: 500;
      line-height: 1.7;
      font-family: 'Barlow', sans-serif;
    }
    .left-tagline p:first-child {
      color: rgba(255, 255, 255, 0.55);
    }
    .cvm-wash {
      position: fixed;
      inset: 0;
      background: rgba(35, 145, 80, 0.12);
      pointer-events: none;
      z-index: 0;
    }
    body > *:not(.cvm-wash) { position: relative; z-index: 1; }
    @media (max-width: 768px) {
      body { flex-direction: column; background: #239150; }
      .left-panel { width: 100%; min-height: auto; }
      .left-panel::before { top: 0; right: 0; left: auto; bottom: auto; width: 70%; height: 100%; background-size: cover; background-position: top right; transform: none; }
      .left-content { padding: 48px 24px 0; gap: 18px; }
      .left-title { font-size: 22px; letter-spacing: 1px; }
      .left-tagline { display: none; }
      .right-panel { margin: -40px 16px 16px; border-radius: 24px; }
      .top-bar { display: none; }
      .form-area { padding: 56px 24px 32px; }
    }
  </style>
</head>
<body>
  <div class="cvm-wash"></div>
  <div class="left-panel">
    <div class="left-content">
      <h1 class="left-title"><span>M-PESA</span><span>Campaign Manager</span></h1>
      <div class="lp-logo-box">
        <img src="M-Pesa-Logo.png" alt="M-PESA" />
      </div>
      <div class="left-tagline">
        <p>Manage Draws &amp; Winners</p>
        <p>Merchant Portal</p>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="top-bar" style="justify-content:flex-end;">
      <span class="portal-brand-text">Safaricom Ethiopia 2026 &copy; All Rights Reserved!</span>
    </div>
    <div class="form-area">
      <p class="instruction">M-PESA CAMPAIGN<br>MANAGER</p>

      <form id="loginForm" onsubmit="doLogin(event)" novalidate>
        <div class="input-label">Email</div>
        <div class="cvm-input-wrap">
          <span class="cvm-input-icon"><i data-lucide="user"></i></span>
          <input type="email" id="email" placeholder="Enter your email"
                 autocomplete="email"
                 class="cvm-input" />
        </div>

        <div class="input-label">Password</div>
        <div class="cvm-input-wrap">
          <span class="cvm-input-icon"><i data-lucide="lock"></i></span>
          <input type="password" id="password" placeholder="Enter your password"
                 autocomplete="current-password"
                 class="cvm-input" style="padding-right:54px;" />
          <button type="button" class="cvm-toggle-pw" id="togglePw" aria-label="Toggle password visibility">
            <i data-lucide="eye" id="eyeIcon"></i>
          </button>
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <button type="submit" class="cvm-login-btn" id="loginBtn">
          <span>Login</span>
          <i data-lucide="arrow-right"></i>
        </button>
      </form>
    </div>
  </div>

  <script>
    function doLogin(e) {
      e.preventDefault();
      const em = document.getElementById('email').value.trim();
      const p = document.getElementById('password').value.trim();
      const err = document.getElementById('errorMsg');
      if (em && p) {
        window.location.href = 'CVM-Home.html';
      } else {
        err.textContent = 'Please enter your email and password.';
        if (!p) document.getElementById('password').focus();
      }
    }
    ['email', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById('errorMsg').textContent = '';
      });
    });
    document.querySelectorAll('.cvm-input').forEach(inp => {
      inp.addEventListener('focus', function() {
        this.style.borderColor = '#239150';
        this.style.background = '#ffffff';
        this.style.boxShadow = '0 0 0 4px rgba(35,145,80,0.1)';
      });
      inp.addEventListener('blur', function() {
        this.style.borderColor = '#d4e9db';
        this.style.background = '#fafafa';
        this.style.boxShadow = 'none';
      });
    });
    document.getElementById('togglePw').addEventListener('click', function() {
      const pw = document.getElementById('password');
      const eye = document.getElementById('eyeIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        eye.setAttribute('data-lucide', 'eye-off');
      } else {
        pw.type = 'password';
        eye.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    });
    if (typeof lucide !== 'undefined' && lucide.createIcons) { lucide.createIcons(); }
  </script>
</body>
</html>
