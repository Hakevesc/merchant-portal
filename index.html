<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M-PESA Portal Selection</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="portal.css" />
  <style>
    .left-title {
      font-family: 'Barlow', sans-serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.15;
      text-align: center;
    }
    @media (max-height: 700px) {
      .left-title { font-size: 1.8rem; }
    }
    .left-title span { display: block; }
    .portal-select {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }
    .portal-select-btn {
      display: flex;
      align-items: center;
      gap: 18px;
      width: 100%;
      padding: 24px 28px;
      border: 2px solid #d4e9db;
      border-radius: 18px;
      background: #fafafa;
      cursor: pointer;
      transition: all 0.25s;
      text-align: left;
      font-family: 'Barlow', sans-serif;
    }
    .portal-select-btn:hover {
      border-color: #239150;
      background: #f0f9f3;
      box-shadow: 0 8px 24px rgba(35, 145, 80, 0.15);
      transform: translateY(-2px);
    }
    .portal-select-btn-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #e8f9ef 0%, #d4f0df 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .portal-select-btn-icon svg {
      width: 28px;
      height: 28px;
      stroke-width: 2.2;
      color: #239150;
    }
    .portal-select-btn-text {
      flex: 1;
    }
    .portal-select-btn-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: #1a1a1a;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 4px;
    }
    .portal-select-btn-sub {
      font-size: 0.8rem;
      font-weight: 600;
      color: #6c7a72;
    }
    .portal-select-btn-arrow {
      color: #239150;
      display: flex;
      align-items: center;
    }
    .portal-select-btn-arrow svg {
      width: 22px;
      height: 22px;
      stroke-width: 2.5;
    }
    .portal-select-heading {
      font-family: 'Barlow', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    .portal-select-sub {
      font-family: 'Barlow', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #6c7a72;
      text-align: center;
      margin-bottom: 28px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
  </style>
</head>
<body>

  <!-- LEFT GREEN PANEL -->
  <div class="left-panel">
    <div class="left-content">
      <h1 class="left-title"><span>M-PESA</span><span>PORTALS</span></h1>

      <div class="lp-logo-box">
        <img src="M-Pesa-Logo.png" alt="M-PESA" />
      </div>

      <div class="left-tagline">
        <p>Select a Portal</p>
        <p>Manage Campaigns, Draws & Winners</p>
      </div>
    </div>
  </div>

  <!-- RIGHT WHITE PANEL -->
  <div class="right-panel">
    <div class="top-bar" style="justify-content:flex-end;">
      <span class="portal-brand-text">Safaricom Ethiopia 2026 &copy; All Rights Reserved!</span>
    </div>

    <div class="form-area" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div class="portal-select-heading">Welcome</div>
      <div class="portal-select-sub">Choose a portal to continue</div>

      <div class="portal-select">
        <button class="portal-select-btn" onclick="window.location.href='merchant-login.html'">
          <div class="portal-select-btn-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <line x1="9" y1="21" x2="9" y2="9"></line>
            </svg>
          </div>
          <div class="portal-select-btn-text">
            <div class="portal-select-btn-title">Merchant Portal</div>
            <div class="portal-select-btn-sub">Manage draws, winners & promotions</div>
          </div>
          <div class="portal-select-btn-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </div>
        </button>

        <button class="portal-select-btn" onclick="window.location.href='CVM-Login Page.html'">
          <div class="portal-select-btn-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </div>
          <div class="portal-select-btn-text">
            <div class="portal-select-btn-title">CVM Portal</div>
            <div class="portal-select-btn-sub">Manage customer bases & campaign rewards</div>
          </div>
          <div class="portal-select-btn-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </div>
        </button>
      </div>
    </div>
  </div>

</body>
</html>
