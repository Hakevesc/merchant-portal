<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Terek Be M-PESA Promo</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="portal.css" />
  <style>
    .left-title {
      font-family: 'Barlow', sans-serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.15;
      text-align: center;
    }
    @media (max-height: 700px) {
      .left-title { font-size: 1.8rem; }
    }
    .left-title span { display: block; }
    #username::placeholder,
    #password::placeholder {
      font-weight: 400;
    }
  </style>
</head>
<body>

  <!-- LEFT GREEN PANEL -->
  <div class="left-panel">
    <div class="left-content">
      <h1 class="left-title"><span>TEREK BE M-PESA</span><span>PROMO</span></h1>

      <div class="lp-logo-box">
        <img src="M-Pesa-Logo.png" alt="M-PESA" />
      </div>

      <div class="left-tagline">
        <p>Merchant Portal</p>
        <p>Manage Draws &amp; Winners</p>
      </div>
    </div>
  </div>

  <!-- RIGHT WHITE PANEL -->
  <div class="right-panel">
    <div class="top-bar" style="justify-content:flex-end;">
      <span class="portal-brand-text">Safaricom Ethiopia 2026 © All Rights Reserved!</span>
    </div>

    <div class="form-area">
      <p class="instruction">TEREK BE M-PESA PROMO<br>MERCHANT PORTAL</p>

      <form id="loginForm" onsubmit="doLogin(event)" novalidate>
        <div class="input-label">Username</div>
        <div style="margin-bottom:30px;">
          <input type="text" id="username" placeholder="Enter your username"
                 autocomplete="username"
                 style="width:100%; padding:16px 20px; border:2px solid #d4e9db; border-radius:12px;
                        font-family:'Barlow',sans-serif; font-size:20px; font-weight:600; color:#1a1a1a;
                        outline:none; background:#fafafa; transition:border-color 0.25s, box-shadow 0.2s;" />
        </div>

        <div class="input-label">Password</div>
        <div style="margin-bottom:30px;position:relative;">
          <input type="password" id="password" placeholder="Enter your password"
                 autocomplete="current-password"
                 style="width:100%; padding:16px 20px; border:2px solid #d4e9db; border-radius:12px;
                        font-family:'Barlow',sans-serif; font-size:20px; font-weight:600; color:#1a1a1a;
                        outline:none; background:#fafafa; transition:border-color 0.25s, box-shadow 0.2s;
                        padding-right:48px;" />
          <span id="togglePw" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);cursor:pointer;color:#888;display:flex;align-items:center;justify-content:center;width:20px;height:20px;" onclick="togglePassword()">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </span>
        </div>

        <p class="error-msg" id="errorMsg" style="margin-bottom:16px;"></p>

        <button type="submit" class="action-btn active" id="loginBtn" style="cursor:pointer;padding:18px 28px;font-size:16px;">
          <span>LOGIN</span>
          <div class="btn-icon" style="display:flex;align-items:center;justify-content:center;padding:4px;">
            <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" style="width:18px;height:18px;">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </div>
        </button>
      </form>
    </div>
  </div>

  <script>
    function doLogin(e) {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      const err = document.getElementById('errorMsg');
      if (u === 'admin' && p === 'admin') {
        window.location.href = 'home.html';
      } else {
        err.textContent = 'Invalid username or password. Please try again.';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }
    ['username', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById('errorMsg').textContent = '';
      });
    });

    document.querySelectorAll('.right-panel input').forEach(inp => {
      inp.addEventListener('focus', function() {
        this.style.borderColor = '#239150';
        this.style.background = '#ffffff';
        this.style.boxShadow = '0 0 0 4px rgba(35,145,80,0.1)';
      });
      inp.addEventListener('blur', function() {
        this.style.borderColor = '#d4e9db';
        this.style.background = '#fafafa';
        this.style.boxShadow = 'none';
      });
    });

    function togglePassword() {
      const pw = document.getElementById('password');
      const eye = document.getElementById('eyeIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        eye.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        pw.type = 'password';
        eye.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }
  </script>
</body>
</html>
