<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Running Draw — Terek Be M-PESA Promo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="portal.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body.portal-body { background: #f0f4f2; background-image: radial-gradient(#c9d9ce 0.8px, transparent 0.8px); background-size: 22px 22px; font-family: 'Barlow', sans-serif; }
    @media (max-width: 620px) { .portal-topbar { padding: 8px 20px; } }

    /* ── Loading card overrides ── */
    .loading-wrap {
      max-width: 560px;
      margin: 44px auto;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(35,145,80,.18), 0 2px 8px rgba(0,0,0,.08);
    }

    .loading-banner {
      background: linear-gradient(135deg, #1a7a40 0%, #239150 55%, #2cac62 100%);
      border-radius: 0;
      padding: 28px 36px 24px;
      position: relative;
      overflow: hidden;
    }
    .loading-banner::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: rgba(255,255,255,.07);
      border-radius: 50%;
    }
    .loading-banner::after {
      content: '';
      position: absolute;
      bottom: -30px; left: 30px;
      width: 100px; height: 100px;
      background: rgba(255,255,255,.05);
      border-radius: 50%;
    }
    .banner-inner {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .banner-eyebrow {
      font-size: .72rem; font-weight: 700; letter-spacing: 1.8px;
      text-transform: uppercase; color: rgba(255,255,255,.65);
    }
    .banner-title {
      font-family: 'Barlow', sans-serif;
      font-size: 1.25rem; font-weight: 800; color: #fff;
      letter-spacing: .3px; text-align: center;
      text-transform: uppercase;
    }
    #prizeTag {
      display: inline-flex; align-items: center; gap: 6px;
      background: #eaf5ee; color: #239150;
      border: 1.5px solid #239150;
      padding: 8px 20px; border-radius: 40px;
      font-family: 'Barlow', sans-serif;
      font-size: .85rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 6px;
    }
    #prizeTag i,
    #prizeTag [data-lucide] { width: 16px; height: 16px; stroke-width: 2.5; color: #239150; }

    .loading-body {
      background: #fff;
      border-radius: 0;
      box-shadow: none;
      padding: 46px 44px 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Dual-ring spinner */
    .spinner-wrap {
      position: relative;
      width: 88px; height: 88px;
      margin-bottom: 28px;
    }
    .spinner-wrap .ring-outer {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 5px solid transparent;
      border-top-color: #239150;
      border-right-color: #239150;
      animation: spin .9s cubic-bezier(.6,.2,.4,.8) infinite;
    }
    .spinner-wrap .ring-inner {
      position: absolute; inset: 14px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-bottom-color: #7dd4a3;
      border-left-color: #7dd4a3;
      animation: spin .7s cubic-bezier(.6,.2,.4,.8) infinite reverse;
    }
    .spinner-wrap .ring-dot {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .spinner-wrap .ring-dot::after {
      content: '';
      width: 10px; height: 10px;
      background: #239150;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(35,145,80,.18);
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-dot { 0%,100%{transform:scale(.8);opacity:.6} 50%{transform:scale(1.15);opacity:1} }

    /* Status label */
    .status-label {
      font-size: .78rem; font-weight: 700; letter-spacing: 1.6px;
      text-transform: uppercase; color: #239150; margin-bottom: 6px;
    }

    /* Progress text */
    .loading-dots {
      font-size: 1rem; color: #444; font-weight: 600; letter-spacing: .2px;
      margin-bottom: 26px; min-height: 1.5em; text-align: center;
      transition: opacity .25s;
    }
    .loading-dots span { display: none; }

    /* Progress track */
    .progress-track {
      width: 100%;
      background: #edf5f1;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 10px;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #239150, #2cac62);
      border-radius: 99px;
      width: 0%;
      transition: width .45s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 24px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.45));
      border-radius: 99px;
    }

    .progress-lbl {
      font-size: .78rem; color: #999; font-family: 'Barlow', sans-serif;
      text-align: right; width: 100%;
    }

    /* Step indicators */
    .step-pills {
      display: flex; gap: 6px; margin-top: 24px; flex-wrap: wrap; justify-content: center;
    }
    .step-pill {
      width: 8px; height: 8px; border-radius: 99px;
      background: #e0e0e0;
      transition: background .3s, width .3s;
    }
    .step-pill.active { background: #239150; width: 22px; }
    .step-pill.done   { background: #7dd4a3; }

    @media (max-width: 600px) {
      .loading-body { padding: 36px 24px 36px; }
      .loading-banner { padding: 24px 24px 20px; }
    }
  </style>
</head>
<body class="portal-body">

  <!-- Topbar -->
  <div class="portal-topbar">
    <div class="brand" style="display:flex;align-items:center;gap:16px;position:relative;z-index:1;">
      <div class="logo-wrapper" style="display:flex;align-items:center;justify-content:center;background:#fff;border-radius:14px;padding:9px 18px;box-shadow:0 4px 14px rgba(0,0,0,0.16);">
        <img src="M-Pesa-Logo.png" alt="M-PESA" style="height:30px;object-fit:contain;display:block;" />
      </div>
      <span class="brand-title" style="font-family:'Barlow',sans-serif;font-weight:800;font-size:1.05rem;letter-spacing:.6px;text-transform:uppercase;color:#fff;padding-left:16px;border-left:2px solid rgba(255,255,255,0.28);line-height:1.15;">Terek Be M-PESA Promo</span>
    </div>
    <div class="topbar-right" style="position:relative;z-index:1;">
      <a href="index.html" class="logout-btn"><i data-lucide="log-out" style="width:16px;height:16px;stroke-width:2.5;"></i> Logout</a>
    </div>
  </div>

  <!-- Breadcrumb (glassy from portal.css) -->
  <div class="portal-nav">
    <a href="home.html"><i data-lucide="home" style="width:16px;height:16px;vertical-align:middle;margin-right:4px;"></i> Home</a>
    &nbsp;›&nbsp;
    <a href="draw-select.html">Draw Selection</a>
    &nbsp;›&nbsp;
    <span class="crumb-active">Running Draw&hellip;</span>
  </div>

  <div class="portal-wrap">
    <div class="loading-wrap">

      <!-- Banner -->
      <div class="loading-banner">
        <div class="banner-inner">
          <div class="banner-eyebrow">Live Draw in Progress</div>
          <div class="banner-title" id="drawTitle">Customer's Bi-Weekly Draw — 26th December 2023</div>
          <div id="prizeTag">Prize</div>
        </div>
      </div>

      <!-- Body -->
      <div class="loading-body">
        <!-- Dual-ring spinner -->
        <div class="spinner-wrap">
          <div class="ring-outer"></div>
          <div class="ring-inner"></div>
          <div class="ring-dot"></div>
        </div>

        <div class="status-label">Processing</div>
        <div class="loading-dots" id="progressLbl">Initialising draw engine&hellip;</div>

        <!-- Progress bar -->
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-lbl" id="progressPct">0%</div>

        <!-- Step pills -->
        <div class="step-pills" id="stepPills"></div>
      </div>

    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const type   = params.get('type')  || 'customers';
    const prize  = params.get('prize') || 'airtime';
    const label  = decodeURIComponent(params.get('label') || 'Prize');

    const typeLabels = { customers:"Customer's", merchants:"Merchant's", agents:"Agent's" };
    document.getElementById('drawTitle').textContent =
      (typeLabels[type] || "Customer's") + " Bi-Weekly Draw — 26th December 2023";
    document.getElementById('prizeTag').innerHTML = '<i data-lucide="gift"></i> ' + label;

    const steps = [
      'Initialising draw engine…',
      'Loading eligible participants…',
      'Verifying transaction records…',
      'Applying regional filters…',
      'Randomising selection pool…',
      'Selecting winners…',
      'Finalising results…',
    ];

    // Build step pills
    const pillsEl = document.getElementById('stepPills');
    steps.forEach((_, i) => {
      const p = document.createElement('div');
      p.className = 'step-pill';
      p.id = 'pill-' + i;
      pillsEl.appendChild(p);
    });

    const fill = document.getElementById('progressFill');
    const lbl  = document.getElementById('progressLbl');
    const pct  = document.getElementById('progressPct');
    let step = 0;

    function advance() {
      if (step >= steps.length) {
        lbl.textContent = 'Done! Redirecting…';
        fill.style.width = '100%';
        pct.textContent = '100%';
        steps.forEach((_, i) => {
          const p = document.getElementById('pill-' + i);
          if (p) { p.classList.remove('active'); p.classList.add('done'); }
        });
        setTimeout(() => {
          window.location.href =
            `winners.html?type=${type}&prize=${encodeURIComponent(prize)}&label=${encodeURIComponent(label)}`;
        }, 700);
        return;
      }

      // Update previous pill to done
      if (step > 0) {
        const prev = document.getElementById('pill-' + (step - 1));
        if (prev) { prev.classList.remove('active'); prev.classList.add('done'); }
      }
      // Activate current pill
      const cur = document.getElementById('pill-' + step);
      if (cur) cur.classList.add('active');

      lbl.textContent = steps[step];
      const pctVal = Math.round((step + 1) / steps.length * 100);
      fill.style.width = pctVal + '%';
      pct.textContent = pctVal + '%';

      step++;
      setTimeout(advance, 500);
    }
    setTimeout(advance, 300);

    if (typeof lucide !== 'undefined' && lucide.createIcons) { lucide.createIcons(); }
  </script>
  <noscript>Enable JavaScript to view draw progress</noscript>
</body>
</html>
