<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winners — Terek Be M-PESA Promo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="portal.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body.portal-body { background: #f2f4f6; background-image: radial-gradient(#dce5e0 0.8px, transparent 0.8px); background-size: 22px 22px; font-family: 'Barlow', sans-serif; }
    .portal-wrap { max-width: 1300px; padding-bottom: 100px; }
    @media (max-width: 620px) { .portal-topbar { padding: 8px 20px; } }

    /* ── Floating bottom bar ── */
    .float-bar {
      position: fixed;
      bottom: 24px;
      left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px;
      background: #fff;
      border-radius: 60px;
      padding: 10px 10px 10px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,.14), 0 2px 8px rgba(35,145,80,.1);
      border: 1px solid rgba(35,145,80,.12);
      z-index: 50;
      min-width: 420px;
      max-width: calc(100vw - 48px);
    }
    .float-bar .pg-info { font-size: .8rem; color: #888; font-weight: 600; white-space: nowrap; }
  </style>
</head>
<body class="portal-body">

  <!-- Topbar -->
  <div class="portal-topbar">
    <div class="brand" style="display:flex;align-items:center;gap:16px;position:relative;z-index:1;">
      <div class="logo-wrapper" style="display:flex;align-items:center;justify-content:center;background:#fff;border-radius:14px;padding:9px 18px;box-shadow:0 4px 14px rgba(0,0,0,0.16);">
        <img src="M-Pesa-Logo.png" alt="M-PESA" style="height:30px;object-fit:contain;display:block;" />
      </div>
      <span class="brand-title" style="font-family:'Barlow',sans-serif;font-weight:800;font-size:1.05rem;letter-spacing:.6px;text-transform:uppercase;color:#fff;padding-left:16px;border-left:2px solid rgba(255,255,255,0.28);line-height:1.15;">Terek Be M-PESA Promo</span>
    </div>
    <div class="topbar-right" style="position:relative;z-index:1;">
      <a href="index.html" class="logout-btn"><i data-lucide="log-out" style="width:16px;height:16px;stroke-width:2.5;"></i> Logout</a>
    </div>
  </div>

  <!-- Breadcrumb (glassy from portal.css) -->
  <div class="portal-nav">
    <a href="home.html"><i data-lucide="home" style="width:16px;height:16px;vertical-align:middle;margin-right:4px;"></i> Home</a>
    &nbsp;›&nbsp;
    <a href="javascript:history.go(-2)" id="drawCrumb">Draw Selection</a>
    &nbsp;›&nbsp;
    <span class="crumb-active" id="prizeCrumb">Winners</span>
  </div>

  <div class="portal-wrap">
    <div class="p-card">

      <!-- Full-width banner -->
      <div class="winners-header">
        <div class="winners-banner">
          <div class="wb-draw"  id="drawTitle">Customer's Bi-Weekly Draw — 26th December 2023</div>
          <div class="wb-prize" id="prizeTitle">250 Birr Airtime Winners</div>
        </div>
      </div>

      <!-- Table column header + rows -->
      <div class="w-head" id="winnersHead"></div>
      <div class="w-list" id="winnersList"></div>

    </div>
  </div>

  <!-- Floating bottom bar -->
  <div class="float-bar">
    <div class="w-pager">
      <button class="pg-btn" onclick="prevPage()"><span>&larr;</span> PREVIOUS</button>
      <span class="pg-info" id="pageInfo">Page 1 of 2</span>
      <button class="pg-btn" onclick="nextPage()">NEXT <span>&rarr;</span></button>
    </div>
    <button class="confirm-close-btn" onclick="openModal()">
      <span class="cc-check">&#10003;</span> CONFIRM & CLOSE
    </button>
  </div>

  <!-- Confirm & Close modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="p-modal">
      <h3>Confirm & Close Draw</h3>
      <p>Are you sure you want to confirm all results and close this draw?<br>This action cannot be undone.</p>
      <div class="modal-btns">
        <button class="pb pb-green" onclick="finalConfirm()">Yes, Confirm</button>
        <button class="pb pb-outline" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const params    = new URLSearchParams(window.location.search);
    const type      = params.get('type')  || 'customers';
    const prize     = params.get('prize') || 'airtime';
    const label     = decodeURIComponent(params.get('label') || 'Airtime — 250 Birr');

    const typeLabels = { customers:"Customer's", merchants:"Merchant's", agents:"Agent's" };
    document.getElementById('drawTitle').textContent  = (typeLabels[type]||"Customer's") + " Bi-Weekly Draw — 26th December 2023";
    document.getElementById('prizeTitle').textContent = label + ' Winners';
    document.getElementById('prizeCrumb').textContent = label + ' Winners';
    document.getElementById('drawCrumb').href = `draw-select.html?type=${type}`;

    // ── Expanded mock data ──
    const CUST = [
      { no:1,  name:'Selam Kebede',      phone:'251712700105', ticket:'W23EDS34E', region:'Addis Ababa', cluster:'Kality',       status:null },
      { no:2,  name:'Hiwi Kalab',        phone:'251710766766', ticket:'W23EDS34E', region:'Addis Ababa', cluster:'Kality',       status:null },
      { no:3,  name:'Fraol Solomon',     phone:'251712700001', ticket:'W23EDS34E', region:'Addis Ababa', cluster:'Bole',         status:null },
      { no:4,  name:'John Lema',         phone:'251712700002', ticket:'W23EDS34E', region:'Addis Ababa', cluster:'Bole',         status:null },
      { no:5,  name:'Dawit Solomon',     phone:'251712700003', ticket:'W23EDS34E', region:'Addis Ababa', cluster:'Kality',       status:null },
      { no:6,  name:'Selam Awiti',       phone:'251712700004', ticket:'W23EDS34E', region:'Addis Ababa', cluster:'Kality',       status:null },
      { no:7,  name:'Hiwi Tola',         phone:'251712700230', ticket:'W23EDS34E', region:'Dire Dawa',   cluster:'Sabian',       status:null },
      { no:8,  name:'Liya Haile',        phone:'251712700005', ticket:'W23EDS34E', region:'Hawassa',     cluster:'Tabor',        status:null },
      { no:9,  name:'Tigist Bekele',     phone:'251712700006', ticket:'W23EDS34E', region:'Bahir Dar',   cluster:'Belay Zeleke', status:null },
      { no:10, name:'Biruk Assefa',      phone:'251712700007', ticket:'W23EDS34E', region:'Addis Ababa', cluster:'Kality',       status:null },
      { no:11, name:'Meron Tesfaye',     phone:'251712700008', ticket:'W23EDS34E', region:'Dire Dawa',   cluster:'Sabian',       status:null },
      { no:12, name:'Abel Hailemariam',  phone:'251712700009', ticket:'W23EDS34E', region:'Hawassa',     cluster:'Tabor',        status:null },
    ];
    const MERCH = [
      { no:1, name:'Manna Hotel Ltd',    phone:'251712700105', till:'10070', ticket:'W23EDS34E', region:'Addis Ababa', cluster:'Kality',       status:null },
      { no:2, name:'Blessed Hotel Ltd',  phone:'251712700106', till:'10071', ticket:'W23EDS34E', region:'Addis Ababa', cluster:'Kality',       status:null },
      { no:3, name:'Star Cafe',          phone:'251712700107', till:'10072', ticket:'W23EDS34E', region:'Addis Ababa', cluster:'Bole',         status:null },
      { no:4, name:'Golden Shop',        phone:'251712700108', till:'10073', ticket:'W23EDS34E', region:'Dire Dawa',   cluster:'Sabian',       status:null },
      { no:5, name:'Blue Nile Mart',     phone:'251712700109', till:'10074', ticket:'W23EDS34E', region:'Hawassa',     cluster:'Tabor',        status:null },
      { no:6, name:'Sunshine PLC',       phone:'251712700110', till:'10075', ticket:'W23EDS34E', region:'Bahir Dar',   cluster:'Belay Zeleke', status:null },
      { no:7, name:'Green Valley PLC',   phone:'251712700111', till:'10076', ticket:'W23EDS34E', region:'Addis Ababa', cluster:'Kality',       status:null },
      { no:8, name:'Royal Mart',         phone:'251712700112', till:'10077', ticket:'W23EDS34E', region:'Dire Dawa',   cluster:'Sabian',       status:null },
      { no:9, name:'Emperor Cafe',       phone:'251712700113', till:'10078', ticket:'W23EDS34E', region:'Hawassa',     cluster:'Tabor',        status:null },
    ];

    const isMerch    = (type === 'merchants');
    const hasActions = (prize !== 'airtime');
    const winners    = isMerch ? MERCH : CUST;

    const PER_PAGE = 15;
    let page = 1;
    const totalPages = Math.ceil(winners.length / PER_PAGE);

    function gridVariant() {
      if (isMerch) return hasActions ? 'wg-m-prize' : 'wg-m-air';
      return hasActions ? 'wg-prize' : 'wg-airtime';
    }

    function headCols() {
      if (isMerch) {
        const base = ['#', 'Merchant', 'Phone', 'Till', 'Ticket', 'Region', 'Cluster'];
        return hasActions ? base.concat(['Action']) : base;
      }
      const base = ['#', 'Name', 'Phone', 'Ticket', 'Region', 'Cluster'];
      return hasActions ? base.concat(['Action']) : base;
    }

    function renderHead() {
      const head = document.getElementById('winnersHead');
      head.className = 'w-head ' + gridVariant();
      head.innerHTML = headCols().map(c => `<span>${c}</span>`).join('');
    }

    function actionHtml(w) {
      if (w.status === 'confirmed')   return `<span class="tag-ok"><i data-lucide="check-circle"></i> CONFIRMED</span>`;
      if (w.status === 'unreachable') return `<span class="tag-nr"><i data-lucide="x-circle"></i> UNREACHABLE</span>`;
      return `<div class="ab">
        <button class="ab-c" onclick="setStatus(${w.no},'confirmed')"><i data-lucide="check" style="width:12px;height:12px;stroke-width:3;"></i> CONFIRM</button>
        <button class="ab-u" onclick="setStatus(${w.no},'unreachable')"><i data-lucide="x" style="width:12px;height:12px;stroke-width:3;"></i> UNREACHABLE</button>
      </div>`;
    }

    function reLucide() {
      if (typeof lucide !== 'undefined' && lucide.createIcons) { lucide.createIcons(); }
    }

    function renderPage() {
      const start = (page - 1) * PER_PAGE;
      const slice = winners.slice(start, start + PER_PAGE);
      const list  = document.getElementById('winnersList');
      list.innerHTML = '';

      slice.forEach(w => {
        const row = document.createElement('div');
        row.className = 'w-row ' + gridVariant();
        if (isMerch) {
          row.innerHTML = `
            <span class="wn">${w.no}.</span>
            <span>${w.name}</span>
            <span>${w.phone}</span>
            <span>${w.till}</span>
            <span>${w.ticket}</span>
            <span>${w.region}</span>
            <span>${w.cluster}</span>
            ${hasActions ? actionHtml(w) : ''}`;
        } else {
          row.innerHTML = `
            <span class="wn">${w.no}.</span>
            <span>${w.name}</span>
            <span>${w.phone}</span>
            <span>${w.ticket}</span>
            <span>${w.region}</span>
            <span>${w.cluster}</span>
            ${hasActions ? actionHtml(w) : ''}`;
        }
        list.appendChild(row);
      });
      document.getElementById('pageInfo').textContent = `Page ${page} of ${totalPages}`;
      reLucide();

      // Disable/enable pagination buttons
      document.querySelector('.pg-btn[onclick="prevPage()"]').style.opacity = (page <= 1) ? '0.35' : '1';
      document.querySelector('.pg-btn[onclick="nextPage()"]').style.opacity = (page >= totalPages) ? '0.35' : '1';
    }

    function setStatus(no, status) {
      const w = winners.find(x => x.no === no);
      if (w) { w.status = status; renderPage(); }
    }

    function prevPage() { if (page > 1)          { page--; renderPage(); } }
    function nextPage() { if (page < totalPages) { page++; renderPage(); } }

    function openModal()    { document.getElementById('confirmModal').classList.add('open'); }
    function closeModal()   { document.getElementById('confirmModal').classList.remove('open'); }
    function finalConfirm() {
      window.location.href =
        `print.html?type=${type}&prize=${encodeURIComponent(prize)}&label=${encodeURIComponent(label)}`;
    }

    renderHead();
    renderPage();

    if (typeof lucide !== 'undefined' && lucide.createIcons) { lucide.createIcons(); }
  </script>
  <noscript>Enable JavaScript to view winners table</noscript>
</body>
</html>
